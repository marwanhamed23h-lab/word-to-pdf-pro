<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول Word إلى PDF الاحترافي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 50px; }
        .btn-primary { background-color: #007bff; border: none; padding: 10px 25px; }
        .header-icon { font-size: 50px; color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 card p-5 text-center">
                <div class="header-icon mb-3">📄➡️📑</div>
                <h2 class="mb-4">محول المستندات الذكي</h2>
                <p class="text-muted mb-4">حول ملفات Word إلى PDF مجاناً وبأعلى جودة</p>
                
                <form action="/docxtopdf" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input class="form-control form-control-lg" type="file" name="word" accept=".docx" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">ابدأ التحويل الآن</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
