<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول ملفات Word إلى PDF الاحترافي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .converter-container { max-width: 550px; margin: 80px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .upload-icon { font-size: 50px; color: #e74c3c; margin-bottom: 20px; }
        .btn-convert { background-color: #e74c3c; border: none; padding: 12px 30px; font-weight: bold; width: 100%; border-radius: 10px; transition: 0.3s; }
        .btn-convert:hover { background-color: #c0392b; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="converter-container text-center">
            <div class="upload-icon">📄</div>
            <h2 class="fw-bold mb-3">محول الـ PDF الذكي</h2>
            <p class="text-muted mb-4">قم بتحويل مستندات Word إلى PDF بجودة عالية وفوراً</p>
            
            <form action="/docxtopdf" method="post" enctype="multipart/form-data">
                <div class="mb-4">
                    <input class="form-control form-control-lg" type="file" name="word" accept=".docx" required>
                </div>
                <button type="submit" class="btn btn-convert text-white">ابدأ التحويل الآن</button>
            </form>
            
            <div class="mt-4 pt-3 border-top">
                <small class="text-secondary">جميع الملفات تُحذف تلقائياً بعد التحويل لحماية خصوصيتك</small>
            </div>
        </div>
    </div>
</body>
</html>
